<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FM Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* =============================================
   TOKENS
============================================= */
:root {
  --bg-base:    #0D1117;
  --bg-card:    #161B22;
  --bg-hover:   #1E2530;
  --bg-sidebar: #0A0E14;
  --border:     #21262D;
  --accent:     #00D4AA;
  --accent-dim: rgba(0,212,170,.12);
  --text-1:     #E6EDF3;
  --text-2:     #8B949E;
  --text-3:     #484F58;
  --win:        #3FB950;
  --draw:       #D29922;
  --loss:       #F85149;
  --ucl:        #388BFD;
  --europa:     #DA7B27;
  --conf:       #58A65C;
  --rel:        #F85149;
  --sidebar-w:  240px;
  --radius:     10px;
}

*, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

body {
  background: var(--bg-base);
  color: var(--text-1);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  display: flex;
}

/* =============================================
   SIDEBAR
============================================= */
.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  height: 100vh;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.logo-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}

.logo-text {
  font-size: 16px;
  font-weight: 800;
  color: var(--text-1);
  letter-spacing: -0.3px;
}

.logo-text span {
  color: var(--accent);
}

.sidebar-section {
  padding: 16px 12px 8px;
}

.sidebar-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 0 8px 8px;
}

.league-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 10px;
  background: none;
  border: none;
  border-radius: 7px;
  color: var(--text-2);
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: background .15s, color .15s;
  text-align: left;
}

.league-btn:hover {
  background: var(--bg-hover);
  color: var(--text-1);
}

.league-btn.active {
  background: var(--accent-dim);
  color: var(--accent);
}

.league-flag {
  font-size: 16px;
  flex-shrink: 0;
}

.league-name { flex: 1; }

.league-season {
  font-size: 10px;
  color: var(--text-3);
  font-family: 'JetBrains Mono', monospace;
}

/* =============================================
   MAIN
============================================= */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* =============================================
   TOP NAV
============================================= */
.topnav {
  background: var(--bg-base);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 4px;
  position: sticky;
  top: 0;
  z-index: 50;
}

.tab-btn {
  padding: 16px 16px 14px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text-2);
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: color .15s, border-color .15s;
  letter-spacing: .2px;
}

.tab-btn:hover { color: var(--text-1); }

.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* =============================================
   CONTENT AREA
============================================= */
.content {
  padding: 24px;
  max-width: 980px;
}

.league-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}

.league-header-flag {
  font-size: 32px;
}

.league-header-info {}

.league-header-name {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.4px;
}

.league-header-meta {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 2px;
}

/* =============================================
   STANDINGS TABLE
============================================= */
.table-wrap {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.standings-table {
  width: 100%;
  border-collapse: collapse;
}

.standings-table thead th {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .8px;
  padding: 10px 14px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

.standings-table thead th:nth-child(2) { text-align: left; }

.standings-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .12s;
  cursor: pointer;
}

.standings-table tbody tr:last-child { border-bottom: none; }
.standings-table tbody tr:hover { background: var(--bg-hover); }

.standings-table td {
  padding: 10px 14px;
  text-align: center;
  font-variant-numeric: tabular-nums;
}

.standings-table td:nth-child(2) { text-align: left; }

.pos-cell {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  width: 40px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.pos-bar {
  width: 3px;
  height: 20px;
  border-radius: 2px;
  background: var(--border);
  flex-shrink: 0;
}

.pos-ucl   .pos-bar { background: var(--ucl); }
.pos-europa .pos-bar { background: var(--europa); }
.pos-conf  .pos-bar { background: var(--conf); }
.pos-rel   .pos-bar { background: var(--rel); }

.team-cell {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 160px;
}

.team-badge {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--bg-hover);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  flex-shrink: 0;
  border: 1px solid var(--border);
}

.team-name-cell {
  font-weight: 600;
  font-size: 13px;
}

.change-up   { color: var(--win);  font-size: 10px; }
.change-down { color: var(--loss); font-size: 10px; }
.change-same { color: var(--text-3); font-size: 10px; }

td.pts {
  font-weight: 800;
  font-size: 14px;
  color: var(--text-1);
  font-family: 'JetBrains Mono', monospace;
}

td.gd-pos { color: var(--win); font-family: 'JetBrains Mono', monospace; }
td.gd-neg { color: var(--loss); font-family: 'JetBrains Mono', monospace; }
td.gd-zero { color: var(--text-2); font-family: 'JetBrains Mono', monospace; }
td.num-col { font-family: 'JetBrains Mono', monospace; color: var(--text-2); }

/* Form pills */
.form-cell {
  display: flex;
  gap: 3px;
  justify-content: center;
}

.form-pill {
  width: 20px; height: 20px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  text-transform: uppercase;
}

.form-W { background: rgba(63,185,80,.2);  color: var(--win); }
.form-D { background: rgba(210,153,34,.2); color: var(--draw); }
.form-L { background: rgba(248,81,73,.2);  color: var(--loss); }

/* =============================================
   LEGEND
============================================= */
.legend {
  display: flex;
  gap: 20px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-2);
}

.legend-dot {
  width: 8px; height: 8px;
  border-radius: 2px;
}

/* =============================================
   MATCHES
============================================= */
.matches-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.round-group {}

.round-header {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding: 0 2px;
}

.match-cards {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.match-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: background .12s, border-color .12s;
  position: relative;
  overflow: hidden;
}

.match-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--border);
  transition: background .2s;
}

.match-card.status-FT::before  { background: var(--text-3); }
.match-card.status-NS::before  { background: var(--accent); }

.match-card:hover {
  background: var(--bg-hover);
  border-color: #2D333B;
}

.match-team {
  display: flex;
  align-items: center;
  gap: 10px;
}

.match-team.away {
  flex-direction: row-reverse;
  text-align: right;
}

.match-badge {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--bg-hover);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-2);
  flex-shrink: 0;
}

.match-team-name {
  font-weight: 700;
  font-size: 14px;
}

.match-score-wrap {
  text-align: center;
  min-width: 80px;
}

.match-score {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: 2px;
}

.match-score .sep { color: var(--text-3); margin: 0 2px; }

.match-status {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

.match-status.ns { color: var(--accent); }
.match-date-time {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}

.scorers {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 180px;
}

.match-team.away .scorers { text-align: right; }

/* match detail panel */
.match-detail {
  display: none;
  padding: 12px 18px 16px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,.2);
}

.match-detail.open { display: block; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 16px;
}

.detail-col-label {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 6px;
}

.scorer-item {
  font-size: 12px;
  color: var(--text-2);
  padding: 2px 0;
}

.scorer-icon { color: var(--draw); margin-right: 4px; }

.stadium-info {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* =============================================
   PLAYERS / STATS
============================================= */
.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.player-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  transition: background .12s, border-color .12s;
  cursor: pointer;
}

.player-card:hover {
  background: var(--bg-hover);
  border-color: #2D333B;
}

.player-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
}

.player-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-hover);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.player-info {}

.player-name {
  font-size: 15px;
  font-weight: 700;
}

.player-meta {
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}

.pos-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  background: var(--accent-dim);
  color: var(--accent);
  margin-left: 6px;
}

.player-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.stat-box {
  background: var(--bg-base);
  border-radius: 7px;
  padding: 8px;
  text-align: center;
}

.stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 600;
  color: var(--text-1);
}

.stat-lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-top: 2px;
}

.rating-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--accent-dim);
  border: 1px solid rgba(0,212,170,.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  margin-top: 10px;
}

/* =============================================
   EMPTY / UTIL
============================================= */
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: .8px;
  margin-bottom: 14px;
}

/* =============================================
   RESPONSIVE
============================================= */
@media (max-width: 700px) {
  :root { --sidebar-w: 0px; }
  .sidebar { transform: translateX(-240px); transition: transform .25s; }
  .sidebar.open { transform: translateX(0); width: 240px; }
  .main { margin-left: 0; }
  .topnav { padding: 0 12px; }
  .content { padding: 14px; }
  .match-card { grid-template-columns: 1fr; gap: 10px; }
  .match-team.away { flex-direction: row; text-align: left; }
  .match-score-wrap { order: -1; text-align: left; }
  .players-grid { grid-template-columns: 1fr; }

  .standings-table .hide-mobile { display: none; }
}

/* =============================================
   SCROLL
============================================= */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #444; }

/* =============================================
   ANIMATE
============================================= */
@keyframes fadeIn {
  from { opacity:0; transform: translateY(6px); }
  to   { opacity:1; transform: translateY(0); }
}
.animate-in { animation: fadeIn .2s ease; }

</style>
</head>
<body>

<!-- ============ SIDEBAR ============ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="#" class="logo-mark">
      <div class="logo-icon">⚽</div>
      <span class="logo-text">FM<span>Tracker</span></span>
    </a>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">리그</div>
    <div id="leagueList"></div>
  </div>
</aside>

<!-- ============ MAIN ============ -->
<div class="main">
  <nav class="topnav">
    <button class="tab-btn active" data-tab="standings">순위표</button>
    <button class="tab-btn" data-tab="matches">경기 결과</button>
    <button class="tab-btn" data-tab="players">선수 통계</button>
  </nav>

  <div class="content">
    <!-- League Header -->
    <div class="league-header" id="leagueHeader"></div>

    <!-- Standings Tab -->
    <div id="tab-standings" class="tab-pane animate-in">
      <div class="table-wrap" id="standingsWrap"></div>
      <div class="legend" id="legendWrap"></div>
    </div>

    <!-- Matches Tab -->
    <div id="tab-matches" class="tab-pane animate-in" style="display:none">
      <div class="matches-container" id="matchesWrap"></div>
    </div>

    <!-- Players Tab -->
    <div id="tab-players" class="tab-pane animate-in" style="display:none">
      <div class="players-grid" id="playersWrap"></div>
    </div>
  </div>
</div>

<script src="fm_data.js"></script>
<script>
// =============================================
// State
// =============================================
let currentLeague = FM_DATA.leagues[0].id;
let currentTab    = 'standings';

// =============================================
// Init
// =============================================
function init() {
  renderSidebar();
  renderLeagueHeader();
  renderStandings();
  renderMatches();
  renderPlayers();
  bindTabs();
}

// =============================================
// Sidebar
// =============================================
const FLAG = { epl:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', ll:'🇪🇸', bl:'🇩🇪' };

function renderSidebar() {
  const el = document.getElementById('leagueList');
  el.innerHTML = FM_DATA.leagues.map(l => `
    <button class="league-btn ${l.id===currentLeague?'active':''}"
            onclick="selectLeague('${l.id}')">
      <span class="league-flag">${FLAG[l.id]||'🏆'}</span>
      <span class="league-name">${l.name}</span>
      <span class="league-season">${l.season.slice(2)}</span>
    </button>
  `).join('');
}

function selectLeague(id) {
  currentLeague = id;
  renderSidebar();
  renderLeagueHeader();
  renderStandings();
  renderMatches();
  renderPlayers();
}

// =============================================
// League Header
// =============================================
function renderLeagueHeader() {
  const l = FM_DATA.leagues.find(x=>x.id===currentLeague);
  document.getElementById('leagueHeader').innerHTML = `
    <div class="league-header-flag">${FLAG[l.id]||'🏆'}</div>
    <div class="league-header-info">
      <div class="league-header-name">${l.name}</div>
      <div class="league-header-meta">${l.country} · ${l.season}</div>
    </div>
  `;
}

// =============================================
// Standings
// =============================================
function posClass(pos, total) {
  if (pos <= 4)  return 'pos-ucl';
  if (pos === 5) return 'pos-europa';
  if (pos === 6) return 'pos-conf';
  if (pos >= total - 2) return 'pos-rel';
  return '';
}

function changeArrow(cur, prev) {
  if (prev == null) return '<span class="change-same">—</span>';
  if (cur < prev)  return '<span class="change-up">▲</span>';
  if (cur > prev)  return '<span class="change-down">▼</span>';
  return '<span class="change-same">—</span>';
}

function gdClass(gd) {
  if (gd > 0) return 'gd-pos';
  if (gd < 0) return 'gd-neg';
  return 'gd-zero';
}

function formPill(f) {
  return `<span class="form-pill form-${f}">${f}</span>`;
}

function teamInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').slice(0,3);
}

function renderStandings() {
  const rows = FM_DATA.standings[currentLeague] || [];
  const total = rows.length;

  const html = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>팀</th>
          <th class="hide-mobile">경기</th>
          <th class="hide-mobile">승</th>
          <th class="hide-mobile">무</th>
          <th class="hide-mobile">패</th>
          <th class="hide-mobile">득</th>
          <th class="hide-mobile">실</th>
          <th>득실</th>
          <th>승점</th>
          <th class="hide-mobile">최근5</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const pc = posClass(r.pos, total);
          return `
          <tr class="${pc}">
            <td>
              <div class="pos-cell">
                <div class="pos-bar"></div>
                ${r.pos}${changeArrow(r.pos, r.prev)}
              </div>
            </td>
            <td>
              <div class="team-cell">
                <div class="team-badge">${teamInitials(r.team)}</div>
                <span class="team-name-cell">${r.team}</span>
              </div>
            </td>
            <td class="num-col hide-mobile">${r.played}</td>
            <td class="num-col hide-mobile">${r.won}</td>
            <td class="num-col hide-mobile">${r.drawn}</td>
            <td class="num-col hide-mobile">${r.lost}</td>
            <td class="num-col hide-mobile">${r.gf}</td>
            <td class="num-col hide-mobile">${r.ga}</td>
            <td class="${gdClass(r.gd)}">${r.gd > 0 ? '+' : ''}${r.gd}</td>
            <td class="pts">${r.pts}</td>
            <td class="hide-mobile">
              <div class="form-cell">
                ${r.form.map(formPill).join('')}
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('standingsWrap').innerHTML = html;

  document.getElementById('legendWrap').innerHTML = `
    <div class="legend-item"><div class="legend-dot" style="background:var(--ucl)"></div> UEFA 챔피언스리그</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--europa)"></div> UEFA 유로파리그</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--conf)"></div> UEFA 컨퍼런스리그</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--rel)"></div> 강등권</div>
  `;
}

// =============================================
// Matches
// =============================================
function renderMatches() {
  const all = (FM_DATA.matches[currentLeague] || []);
  // group by round
  const groups = {};
  all.forEach(m => {
    if (!groups[m.round]) groups[m.round] = [];
    groups[m.round].push(m);
  });

  const rounds = Object.keys(groups).sort((a,b) => b-a); // newest first

  const html = rounds.map(round => {
    const matches = groups[round];
    return `
      <div class="round-group">
        <div class="round-header">${round}라운드</div>
        <div class="match-cards">
          ${matches.map(renderMatchCard).join('')}
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('matchesWrap').innerHTML = html || '<p style="color:var(--text-3)">경기 데이터가 없습니다.</p>';
}

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday:'short' });
}

function renderMatchCard(m) {
  const isFT = m.status === 'FT';
  const isNS = m.status === 'NS';

  const scoreHtml = isFT
    ? `<div class="match-score">${m.homeScore}<span class="sep">:</span>${m.awayScore}</div>
       <div class="match-status">FT</div>`
    : `<div class="match-score" style="color:var(--text-3)">vs</div>
       <div class="match-status ns">예정</div>
       <div class="match-date-time">${formatDate(m.date)}</div>`;

  return `
    <div class="match-card status-${m.status}" onclick="toggleMatchDetail('${m.id}')">
      <div class="match-team home">
        <div class="match-badge">${teamInitials(m.home)}</div>
        <div>
          <div class="match-team-name">${m.home}</div>
          ${isFT && m.homeScorerList.length ? `<div class="scorers">${m.homeScorerList.join(', ')}</div>` : ''}
        </div>
      </div>
      <div class="match-score-wrap">${scoreHtml}</div>
      <div class="match-team away">
        <div class="match-badge">${teamInitials(m.away)}</div>
        <div>
          <div class="match-team-name">${m.away}</div>
          ${isFT && m.awayScorerList.length ? `<div class="scorers">${m.awayScorerList.join(', ')}</div>` : ''}
        </div>
      </div>
    </div>
    <div class="match-detail" id="detail-${m.id}">
      <div class="detail-grid">
        <div>
          <div class="detail-col-label">${m.home} 득점</div>
          ${m.homeScorerList.length
            ? m.homeScorerList.map(s=>`<div class="scorer-item"><span class="scorer-icon">⚽</span>${s}</div>`).join('')
            : `<div style="color:var(--text-3);font-size:12px">득점 없음</div>`}
        </div>
        <div>
          <div class="detail-col-label">${m.away} 득점</div>
          ${m.awayScorerList.length
            ? m.awayScorerList.map(s=>`<div class="scorer-item"><span class="scorer-icon">⚽</span>${s}</div>`).join('')
            : `<div style="color:var(--text-3);font-size:12px">득점 없음</div>`}
        </div>
      </div>
      <div class="stadium-info">🏟️ ${m.stadium}</div>
    </div>
  `;
}

function toggleMatchDetail(id) {
  const el = document.getElementById('detail-' + id);
  if (el) el.classList.toggle('open');
}

// =============================================
// Players
// =============================================
function renderPlayers() {
  const players = FM_DATA.players.filter(p => p.league === currentLeague);

  if (!players.length) {
    document.getElementById('playersWrap').innerHTML = `<p style="color:var(--text-3)">해당 리그 선수 데이터가 없습니다.</p>`;
    return;
  }

  document.getElementById('playersWrap').innerHTML = players
    .sort((a,b) => b.stats.rating - a.stats.rating)
    .map(p => `
      <div class="player-card">
        <div class="player-header">
          <div class="player-avatar">👤</div>
          <div class="player-info">
            <div class="player-name">${p.name} <span class="pos-badge">${p.pos}</span></div>
            <div class="player-meta">${p.team} · ${p.nationality} · ${p.age}세</div>
            <div class="rating-badge">⭐ ${p.stats.rating}</div>
          </div>
        </div>
        <div class="player-stats">
          <div class="stat-box">
            <div class="stat-val">${p.stats.goals}</div>
            <div class="stat-lbl">골</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${p.stats.assists}</div>
            <div class="stat-lbl">어시스트</div>
          </div>
          <div class="stat-box">
            <div class="stat-val">${p.stats.apps}</div>
            <div class="stat-lbl">출전</div>
          </div>
        </div>
      </div>
    `).join('');
}

// =============================================
// Tabs
// =============================================
function bindTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
      const pane = document.getElementById('tab-' + tab);
      pane.style.display = 'block';
      pane.classList.remove('animate-in');
      void pane.offsetWidth; // reflow
      pane.classList.add('animate-in');
    });
  });
}

// =============================================
// GO
// =============================================
init();
</script>
</body>
</html>
