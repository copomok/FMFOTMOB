<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FM Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1117; --card:#161B22; --hover:#1C2330; --sidebar:#0A0E14;
  --border:#21262D; --border2:#2D333B;
  --accent:#00D4AA; --accent-dim:rgba(0,212,170,.12); --accent-glow:rgba(0,212,170,.25);
  --t1:#E6EDF3; --t2:#8B949E; --t3:#484F58; --t4:#2D333B;
  --win:#3FB950; --draw:#D29922; --loss:#F85149;
  --ucl:#388BFD; --eur:#DA7B27; --conf:#58A65C; --rel:#F85149;
  --sw:220px; --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;display:flex}

/* ── SIDEBAR ── */
.sb{width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto}
.sb-logo{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;text-decoration:none}
.sb-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.sb-title{font-size:15px;font-weight:800;color:var(--t1);letter-spacing:-.3px}
.sb-title span{color:var(--accent)}
.sb-section{padding:14px 10px 6px}
.sb-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:0 8px 8px}
.lg-btn{display:flex;align-items:center;gap:9px;width:100%;padding:8px 10px;background:none;border:none;border-radius:7px;color:var(--t2);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;text-align:left}
.lg-btn:hover{background:var(--hover);color:var(--t1)}
.lg-btn.active{background:var(--accent-dim);color:var(--accent)}
.lg-flag{font-size:15px;flex-shrink:0}
.lg-name{flex:1}
.lg-sea{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.my-team-pill{margin:10px 10px 6px;background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:8px;padding:10px 12px}
.my-team-pill-lbl{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.my-team-pill-name{font-size:13px;font-weight:700;color:var(--t1)}

/* ── MAIN ── */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topnav{background:var(--bg);border-bottom:1px solid var(--border);padding:0 22px;display:flex;align-items:center;gap:2px;position:sticky;top:0;z-index:100}
.tab-btn{padding:15px 14px 13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;letter-spacing:.2px}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:22px;max-width:1000px}

/* ── PAGE HEADER ── */
.pg-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.pg-flag{font-size:30px}
.pg-name{font-size:20px;font-weight:800;letter-spacing:-.4px}
.pg-meta{font-size:12px;color:var(--t2);margin-top:2px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}

/* ── STANDINGS ── */
.std-table{width:100%;border-collapse:collapse}
.std-table thead th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:9px 14px;text-align:center;border-bottom:1px solid var(--border)}
.std-table thead th:nth-child(2){text-align:left}
.std-table tbody tr{border-bottom:1px solid var(--border);transition:.12s;cursor:pointer}
.std-table tbody tr:last-child{border-bottom:none}
.std-table tbody tr:hover{background:var(--hover)}
.std-table tbody tr.my-team-row{background:rgba(0,212,170,.06)}
.std-table tbody tr.my-team-row:hover{background:rgba(0,212,170,.1)}
.std-table td{padding:9px 14px;text-align:center;font-variant-numeric:tabular-nums}
.std-table td:nth-child(2){text-align:left}
.pos-cell{display:flex;align-items:center;gap:5px;font-weight:700;color:var(--t2);font-size:13px}
.pos-bar{width:3px;height:18px;border-radius:2px;background:var(--border);flex-shrink:0}
.row-ucl .pos-bar{background:var(--ucl)} .row-eur .pos-bar{background:var(--eur)}
.row-conf .pos-bar{background:var(--conf)} .row-rel .pos-bar{background:var(--rel)}
.team-cell{display:flex;align-items:center;gap:9px;min-width:150px}
.t-badge{width:22px;height:22px;border-radius:50%;background:var(--hover);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--t2);flex-shrink:0}
.my-badge{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.t-name{font-weight:600;font-size:13px}
.my-t-name{color:var(--accent)}
.chg-up{color:var(--win);font-size:10px} .chg-dn{color:var(--loss);font-size:10px} .chg-eq{color:var(--t3);font-size:10px}
td.pts{font-weight:800;font-size:14px;font-family:'JetBrains Mono',monospace}
td.gd-p{color:var(--win);font-family:'JetBrains Mono',monospace} td.gd-n{color:var(--loss);font-family:'JetBrains Mono',monospace} td.gd-z{color:var(--t2);font-family:'JetBrains Mono',monospace}
td.num{font-family:'JetBrains Mono',monospace;color:var(--t2)}
.form-wrap{display:flex;gap:3px;justify-content:center}
.fp{width:19px;height:19px;border-radius:4px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fp-W{background:rgba(63,185,80,.2);color:var(--win)} .fp-D{background:rgba(210,153,34,.2);color:var(--draw)} .fp-L{background:rgba(248,81,73,.2);color:var(--loss)}
.legend{display:flex;gap:18px;margin-top:12px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t2)}
.leg-d{width:8px;height:8px;border-radius:2px}

/* ── MATCHES ── */
.round-sec{margin-bottom:18px}
.round-hd{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.match-cards{display:flex;flex-direction:column;gap:2px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:13px 17px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;cursor:pointer;transition:.12s;position:relative;overflow:hidden}
.mc::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--border)}
.mc.ft::after{background:var(--t3)} .mc.ns::after{background:var(--accent)}
.mc.my-mc{border-color:rgba(0,212,170,.3);background:rgba(0,212,170,.04)}
.mc.my-mc::after{background:var(--accent)}
.mc:hover{background:var(--hover);border-color:var(--border2)}
.mc.my-mc:hover{background:rgba(0,212,170,.08)}
.m-team{display:flex;align-items:center;gap:9px}
.m-team.away{flex-direction:row-reverse;text-align:right}
.m-badge{width:28px;height:28px;border-radius:50%;background:var(--hover);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t2);flex-shrink:0}
.m-badge.my{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.m-tname{font-weight:700;font-size:13px}
.m-tname.my{color:var(--accent)}
.m-scorers{font-size:11px;color:var(--t2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.m-sc-wrap{text-align:center;min-width:76px}
.m-score{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;letter-spacing:2px}
.m-score .sep{color:var(--t3);margin:0 2px}
.m-status{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.m-status.ns-lbl{color:var(--accent)}
.m-date{font-size:11px;color:var(--t2);margin-top:2px}
.detail-arrow{font-size:11px;color:var(--accent);font-weight:600;margin-top:4px;opacity:.7}

/* ── MATCH CENTER (드로어) ── */
.mc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:none;backdrop-filter:blur(3px)}
.mc-overlay.open{display:flex;justify-content:flex-end}
.mc-panel{width:560px;max-width:100%;background:var(--card);height:100vh;overflow-y:auto;display:flex;flex-direction:column;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
.mc-top{padding:18px 20px 0;border-bottom:1px solid var(--border)}
.mc-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:.15s;float:right;margin-top:-2px}
.mc-close:hover{background:var(--hover);color:var(--t1)}
.mc-score-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;gap:12px}
.mc-team-hd{text-align:center;flex:1}
.mc-team-name{font-size:14px;font-weight:700}
.mc-team-name.my{color:var(--accent)}
.mc-score-big{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:600;color:var(--t1);letter-spacing:4px;text-align:center;min-width:80px}
.mc-score-sep{color:var(--t3)}
.mc-meta{text-align:center;font-size:11px;color:var(--t2);padding-bottom:12px}
.mc-tabs{display:flex;padding:0 20px;gap:0;border-bottom:1px solid var(--border)}
.mc-tab{padding:11px 14px 9px;background:none;border:none;border-bottom:2px solid transparent;color:var(--t2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.mc-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.mc-body{padding:18px 20px;flex:1}
/* Events tab */
.ev-list{display:flex;flex-direction:column;gap:4px}
.ev-item{display:grid;grid-template-columns:1fr 44px 1fr;align-items:start;gap:8px}
.ev-home,.ev-away{padding:6px 0}
.ev-away{text-align:right}
.ev-min{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--t2);text-align:center;padding-top:8px}
.ev-player{font-size:12px;font-weight:600}
.ev-detail{font-size:11px;color:var(--t2);margin-top:1px}
.ev-icon{font-size:14px;margin-right:5px}
.ev-icon-r{font-size:14px;margin-left:5px}
/* Stats tab */
.stat-row{margin-bottom:14px}
.stat-label{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin-bottom:4px}
.stat-val-h,.stat-val-a{font-weight:700;color:var(--t1)}
.stat-bar-wrap{height:5px;background:var(--t4);border-radius:3px;display:flex;overflow:hidden}
.stat-bar-h{background:var(--accent);border-radius:3px 0 0 3px;transition:.4s}
.stat-bar-a{background:var(--t3);border-radius:0 3px 3px 0;transition:.4s}
/* Lineup tab */
.lineup-section{margin-bottom:18px}
.lineup-sec-hd{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.lineup-grid{display:flex;flex-direction:column;gap:2px}
.lp-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:7px;transition:.12s}
.lp-row:hover{background:var(--hover)}
.lp-no{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);width:20px;text-align:right;flex-shrink:0}
.lp-name{flex:1;font-size:12px;font-weight:600}
.lp-pos{font-size:10px;color:var(--t3);background:var(--hover);padding:1px 5px;border-radius:4px}
.lp-rating{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;min-width:28px;text-align:right}
.lp-events{display:flex;gap:3px;align-items:center;margin-left:4px}
.lp-ev{font-size:12px}
.lp-sub{font-size:10px;color:var(--t3)}
.motm-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(210,153,34,.15);border:1px solid rgba(210,153,34,.3);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--draw);margin-bottom:12px}
.rating-color-9{color:#00D4AA} .rating-color-8{color:#3FB950} .rating-color-7{color:var(--t1)} .rating-color-6{color:var(--t2)} .rating-color-5{color:var(--loss)}

/* ── PLAYERS ── */
.squad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.p-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:.12s}
.p-card:hover{background:var(--hover);border-color:var(--border2);transform:translateY(-1px)}
.p-head{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.p-avatar{width:42px;height:42px;border-radius:50%;background:var(--hover);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-info{}
.p-name{font-size:14px;font-weight:700}
.p-meta{font-size:11px;color:var(--t2);margin-top:2px}
.p-pos-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:var(--accent-dim);color:var(--accent);margin-left:6px}
.p-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.p-stat{background:var(--bg);border-radius:7px;padding:8px 6px;text-align:center}
.p-stat-v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600}
.p-stat-l{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-top:1px}
.p-rating{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);border:1px solid var(--accent-glow);border-radius:20px;padding:3px 9px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--accent);margin-top:10px}

/* ── PLAYER DETAIL MODAL ── */
.pd-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(4px)}
.pd-overlay.open{display:flex}
.pd-modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:680px;margin:auto;animation:fadeUp .22s ease}
@keyframes fadeUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.pd-hero{padding:22px 22px 18px;border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:center;position:relative}
.pd-avatar{width:60px;height:60px;border-radius:50%;background:var(--hover);border:2px solid var(--accent-glow);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.pd-hero-info{}
.pd-name{font-size:20px;font-weight:800;letter-spacing:-.3px}
.pd-sub{font-size:12px;color:var(--t2);margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pd-pos-pill{background:var(--accent-dim);border:1px solid var(--accent-glow);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.pd-close{position:absolute;top:16px;right:16px;background:var(--hover);border:none;color:var(--t2);width:28px;height:28px;border-radius:6px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.pd-close:hover{background:var(--border2);color:var(--t1)}
.pd-attrs{padding:14px 22px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.pd-attr{text-align:center}
.pd-attr-v{font-size:13px;font-weight:700;color:var(--t1)}
.pd-attr-l{font-size:10px;color:var(--t3);margin-top:2px}
.pd-season{padding:16px 22px;border-bottom:1px solid var(--border)}
.pd-sec-title{font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.pd-sstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.pd-sstat{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.pd-sstat-v{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700}
.pd-sstat-l{font-size:10px;color:var(--t3);margin-top:2px}
.pd-xg-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pd-xg-box{background:var(--bg);border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between}
.pd-xg-lbl{font-size:11px;color:var(--t2)}
.pd-xg-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;color:var(--accent)}
.pd-adv{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.pd-adv-row{display:flex;justify-content:space-between;align-items:center;padding:5px 10px;background:var(--bg);border-radius:6px}
.pd-adv-lbl{font-size:11px;color:var(--t2)}
.pd-adv-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--t1)}
.pd-log{padding:16px 22px 20px}
.pd-log-table{width:100%;border-collapse:collapse}
.pd-log-table th{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;padding:6px 8px;text-align:center;border-bottom:1px solid var(--border)}
.pd-log-table th:first-child,.pd-log-table td:first-child{text-align:left}
.pd-log-table td{padding:8px 8px;text-align:center;font-size:12px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.pd-log-table tr:last-child td{border-bottom:none}
.pd-log-table tr:hover td{background:var(--hover)}
td.res-w{color:var(--win);font-weight:700} td.res-d{color:var(--draw);font-weight:700} td.res-l{color:var(--loss);font-weight:700}

/* ── ANIM ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ani{animation:fadeIn .2s ease}

/* ── SCROLL ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── MOBILE ── */
@media(max-width:680px){
  :root{--sw:0px}
  .sb{transform:translateX(-220px)}
  .main{margin-left:0}
  .mc-panel{width:100%}
  .content{padding:12px}
  .squad-grid{grid-template-columns:1fr}
  .pd-sstats{grid-template-columns:repeat(3,1fr)}
  .pd-attrs{grid-template-columns:repeat(2,1fr)}
  .hide-m{display:none}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sb" id="sb">
  <a href="#" class="sb-logo" onclick="return false">
    <div class="sb-icon">⚽</div>
    <span class="sb-title">FM<span>Tracker</span></span>
  </a>
  <div id="myTeamPill"></div>
  <div class="sb-section">
    <div class="sb-lbl">리그</div>
    <div id="lgList"></div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <nav class="topnav">
    <button class="tab-btn active" data-tab="standings">순위표</button>
    <button class="tab-btn" data-tab="matches">경기</button>
    <button class="tab-btn" data-tab="squad">스쿼드</button>
  </nav>
  <div class="content" id="mainContent">
    <div id="pgHead" class="pg-head"></div>
    <div id="tab-standings" class="tab-pane ani"></div>
    <div id="tab-matches"   class="tab-pane ani" style="display:none"></div>
    <div id="tab-squad"     class="tab-pane ani" style="display:none"></div>
  </div>
</div>

<!-- MATCH CENTER DRAWER -->
<div class="mc-overlay" id="mcOverlay" onclick="closeMC(event)">
  <div class="mc-panel" id="mcPanel" onclick="event.stopPropagation()">
    <div class="mc-top">
      <button class="mc-close" onclick="closeMC()">✕</button>
      <div id="mcContent"></div>
    </div>
  </div>
</div>

<!-- PLAYER DETAIL MODAL -->
<div class="pd-overlay" id="pdOverlay" onclick="closePD(event)">
  <div class="pd-modal" onclick="event.stopPropagation()">
    <div id="pdContent"></div>
  </div>
</div>

<script src="fm_data.js"></script>
<script>
// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let curLeague = FM.myLeague;
let curTab    = 'standings';

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,3).toUpperCase();
const isMyTeam = t => t === FM.myTeam;
const myLeagueObj = () => FM.leagues.find(l=>l.id===curLeague);
const ratingColor = r => r>=8.5?'9':r>=7.5?'8':r>=6.5?'7':r>=5.5?'6':'5';
const fmtDate = s => { const d=new Date(s); return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'}); };

function getMatchEvents(m) {
  if (!m.events) return [];
  return m.events;
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  renderSidebar();
  renderPageHeader();
  renderStandings();
  renderMatches();
  renderSquad();
  bindTabs();
}

// ══════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════
function renderSidebar() {
  // My team pill
  document.getElementById('myTeamPill').innerHTML = `
    <div class="my-team-pill">
      <div class="my-team-pill-lbl">내 팀</div>
      <div class="my-team-pill-name">⚽ ${FM.myTeam}</div>
    </div>`;

  // League list
  document.getElementById('lgList').innerHTML = FM.leagues.map(l=>`
    <button class="lg-btn ${l.id===curLeague?'active':''}" onclick="selectLeague('${l.id}')">
      <span class="lg-flag">${l.flag}</span>
      <span class="lg-name">${l.name}</span>
      <span class="lg-sea">${l.season.slice(2)}</span>
    </button>`).join('');
}

function selectLeague(id) {
  curLeague = id;
  renderSidebar();
  renderPageHeader();
  renderStandings();
  renderMatches();
  renderSquad();
  switchTabTo(curTab);
}

// ══════════════════════════════════════════════
//  PAGE HEADER
// ══════════════════════════════════════════════
function renderPageHeader() {
  const l = myLeagueObj();
  document.getElementById('pgHead').innerHTML = `
    <div class="pg-flag">${l.flag}</div>
    <div>
      <div class="pg-name">${l.name}</div>
      <div class="pg-meta">${l.country} · ${l.season}</div>
    </div>`;
}

// ══════════════════════════════════════════════
//  STANDINGS
// ══════════════════════════════════════════════
function posRowClass(pos, total) {
  if (pos<=4) return 'row-ucl';
  if (pos===5) return 'row-eur';
  if (pos===6) return 'row-conf';
  if (pos>=total-2) return 'row-rel';
  return '';
}
function chgArrow(c,p) {
  if(p==null) return '<span class="chg-eq">—</span>';
  if(c<p) return '<span class="chg-up">▲</span>';
  if(c>p) return '<span class="chg-dn">▼</span>';
  return '<span class="chg-eq">—</span>';
}

function renderStandings() {
  const rows = FM.standings[curLeague] || [];
  const total = rows.length;
  const html = `
    <div class="card">
      <table class="std-table">
        <thead><tr>
          <th>#</th><th>팀</th>
          <th class="hide-m">경기</th><th class="hide-m">승</th>
          <th class="hide-m">무</th><th class="hide-m">패</th>
          <th class="hide-m">득</th><th class="hide-m">실</th>
          <th>득실</th><th>승점</th><th class="hide-m">최근5</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>{
            const pc = posRowClass(r.pos,total);
            const my = isMyTeam(r.team);
            const gd = r.gf-r.ga;
            return `<tr class="${pc}${my?' my-team-row':''}">
              <td><div class="pos-cell"><div class="pos-bar"></div>${r.pos}${chgArrow(r.pos,r.prev)}</div></td>
              <td><div class="team-cell">
                <div class="t-badge${my?' my-badge':''}">${initials(r.team)}</div>
                <span class="t-name${my?' my-t-name':''}">${r.team}</span>
              </div></td>
              <td class="num hide-m">${r.played}</td>
              <td class="num hide-m">${r.won}</td>
              <td class="num hide-m">${r.drawn}</td>
              <td class="num hide-m">${r.lost}</td>
              <td class="num hide-m">${r.gf}</td>
              <td class="num hide-m">${r.ga}</td>
              <td class="${gd>0?'gd-p':gd<0?'gd-n':'gd-z'}">${gd>0?'+':''}${gd}</td>
              <td class="pts">${r.pts}</td>
              <td class="hide-m"><div class="form-wrap">${r.form.map(f=>`<span class="fp fp-${f}">${f}</span>`).join('')}</div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="legend">
      <div class="leg-i"><div class="leg-d" style="background:var(--ucl)"></div>UCL</div>
      <div class="leg-i"><div class="leg-d" style="background:var(--eur)"></div>유로파</div>
      <div class="leg-i"><div class="leg-d" style="background:var(--conf)"></div>컨퍼런스</div>
      <div class="leg-i"><div class="leg-d" style="background:var(--rel)"></div>강등권</div>
    </div>`;
  document.getElementById('tab-standings').innerHTML = html;
}

// ══════════════════════════════════════════════
//  MATCHES
// ══════════════════════════════════════════════
function renderMatches() {
  const all = FM.matches[curLeague] || [];
  const groups = {};
  all.forEach(m=>{ if(!groups[m.round]) groups[m.round]=[]; groups[m.round].push(m); });
  const rounds = Object.keys(groups).sort((a,b)=>b-a);

  const html = rounds.map(rnd=>`
    <div class="round-sec">
      <div class="round-hd">${rnd}라운드</div>
      <div class="match-cards">${groups[rnd].map(renderMatchCard).join('')}</div>
    </div>`).join('') || '<p style="color:var(--t3)">경기 데이터가 없습니다.</p>';

  document.getElementById('tab-matches').innerHTML = html;
}

function renderMatchCard(m) {
  const ft = m.status==='FT', ns = m.status==='NS';
  const myMatch = isMyTeam(m.home)||isMyTeam(m.away);
  const homeClass = isMyTeam(m.home)?'my':'';
  const awayClass = isMyTeam(m.away)?'my':'';

  // collect scorer strings
  const evs = m.events||[];
  const homeGoals = evs.filter(e=>e.type==='goal'&&e.team===m.home).map(e=>`${e.player} ${e.min}'`);
  const awayGoals = evs.filter(e=>e.type==='goal'&&e.team===m.away).map(e=>`${e.player} ${e.min}'`);

  const scoreHtml = ft
    ? `<div class="m-score">${m.homeScore}<span class="sep">:</span>${m.awayScore}</div>
       <div class="m-status">FT</div>`
    : `<div class="m-score" style="color:var(--t3)">vs</div>
       <div class="m-status ns-lbl">예정</div>
       <div class="m-date">${fmtDate(m.date)}</div>`;

  const detailBtn = myMatch && ft
    ? `<div class="detail-arrow">매치센터 보기 →</div>` : '';

  return `
    <div class="mc ${ft?'ft':'ns'}${myMatch?' my-mc':''}" onclick="openMatchCenter('${m.id}')">
      <div class="m-team home">
        <div class="m-badge ${homeClass}">${initials(m.home)}</div>
        <div>
          <div class="m-tname ${homeClass}">${m.home}</div>
          ${ft&&homeGoals.length?`<div class="m-scorers">${homeGoals.join(', ')}</div>`:''}
        </div>
      </div>
      <div class="m-sc-wrap">${scoreHtml}${detailBtn}</div>
      <div class="m-team away">
        <div class="m-badge ${awayClass}">${initials(m.away)}</div>
        <div>
          <div class="m-tname ${awayClass}">${m.away}</div>
          ${ft&&awayGoals.length?`<div class="m-scorers">${awayGoals.join(', ')}</div>`:''}
        </div>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════
//  MATCH CENTER
// ══════════════════════════════════════════════
function openMatchCenter(id) {
  const all = Object.values(FM.matches).flat();
  const m = all.find(x=>x.id===id);
  if (!m) return;

  const myMatch = isMyTeam(m.home)||isMyTeam(m.away);
  const ft = m.status==='FT';

  // score header
  let scoreDisplay = ft
    ? `<div class="mc-score-big">${m.homeScore}<span class="mc-score-sep"> : </span>${m.awayScore}</div>`
    : `<div class="mc-score-big" style="color:var(--t3); font-size:20px">예정</div>`;

  // determine which tabs to show
  const hasDetail = myMatch && ft && m.events && m.lineup;
  const tabs = hasDetail
    ? ['이벤트','통계','라인업']
    : (ft && m.events ? ['이벤트','통계'] : []);

  let html = `
    <div class="mc-score-hd">
      <div class="mc-team-hd"><div class="mc-team-name ${isMyTeam(m.home)?'my':''}">${m.home}</div></div>
      ${scoreDisplay}
      <div class="mc-team-hd"><div class="mc-team-name ${isMyTeam(m.away)?'my':''}">${m.away}</div></div>
    </div>
    <div class="mc-meta">
      ${m.stadium}${m.attendance ? ` · ${m.attendance.toLocaleString()}명` : ''}
      ${ft?` · 경기 종료`:''}
    </div>`;

  if (tabs.length) {
    html += `<div class="mc-tabs">
      ${tabs.map((t,i)=>`<button class="mc-tab ${i===0?'active':''}" onclick="switchMCTab(this,'mct-${i}')">${t}</button>`).join('')}
    </div>
    <div class="mc-body">
      ${tabs.map((t,i)=>`<div id="mct-${i}" class="mc-pane" style="${i>0?'display:none':''}">${buildMCTabContent(m,t)}</div>`).join('')}
    </div>`;
  } else {
    html += `<div class="mc-body" style="padding:30px 20px;text-align:center;color:var(--t3)">
      ${ft?'상세 데이터가 없습니다.':'경기 시작 전입니다.'}
    </div>`;
  }

  document.getElementById('mcContent').innerHTML = html;
  document.getElementById('mcOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function buildMCTabContent(m, tab) {
  if (tab==='이벤트') return buildEventsTab(m);
  if (tab==='통계')   return buildStatsTab(m);
  if (tab==='라인업') return buildLineupTab(m);
  return '';
}

function buildEventsTab(m) {
  const evs = m.events||[];
  if (!evs.length) return '<p style="color:var(--t3);text-align:center;padding:20px">이벤트 데이터 없음</p>';

  const evIcon = {goal:'⚽',yellow:'🟨',red:'🟥',sub:'🔄'};
  const rows = evs.map(e=>{
    const isHome = e.team===m.home;
    const icon = evIcon[e.type]||'•';
    const detail = e.type==='goal' ? `${e.detail||''}${e.assist?` (어시 ${e.assist})`:''}`
                 : e.type==='sub'  ? `→ ${e.sub}`
                 : e.detail||'';
    const cell = `<div class="ev-player"><span class="ev-icon">${icon}</span>${e.player}</div>
                  <div class="ev-detail">${detail}</div>`;
    return `<div class="ev-item">
      <div class="ev-home">${isHome?cell:''}</div>
      <div class="ev-min">${e.min}'</div>
      <div class="ev-away">${!isHome?cell:''}</div>
    </div>`;
  });
  return `<div class="ev-list">${rows.join('')}</div>`;
}

function buildStatsTab(m) {
  if (!m.stats) return '<p style="color:var(--t3);text-align:center;padding:20px">통계 데이터 없음</p>';
  const s = m.stats;
  const labels = [
    ['점유율 (%)', s.possession[0], s.possession[1]],
    ['슛',        s.shots[0],       s.shots[1]],
    ['유효슈팅',  s.shotsOnTarget[0],s.shotsOnTarget[1]],
    ['코너킥',    s.corners[0],     s.corners[1]],
    ['파울',      s.fouls[0],       s.fouls[1]],
    ['xG',        s.xg[0],          s.xg[1]],
  ];
  return labels.map(([lbl,h,a])=>{
    const tot = parseFloat(h)+parseFloat(a)||1;
    const pct = Math.round(parseFloat(h)/tot*100);
    return `<div class="stat-row">
      <div class="stat-label">
        <span class="stat-val-h">${h}</span>
        <span style="color:var(--t3)">${lbl}</span>
        <span class="stat-val-a">${a}</span>
      </div>
      <div class="stat-bar-wrap">
        <div class="stat-bar-h" style="width:${pct}%"></div>
        <div class="stat-bar-a" style="width:${100-pct}%"></div>
      </div>
    </div>`;
  }).join('');
}

function buildLineupTab(m) {
  if (!m.lineup) return '<p style="color:var(--t3);text-align:center;padding:20px">라인업 데이터 없음</p>';
  const {home, away} = m.lineup;

  function renderTeamLineup(side, teamName) {
    const starters  = side.players.filter(p=>p.starter);
    const subs      = side.players.filter(p=>!p.starter);
    const motmStr   = side.motm ? `<div class="motm-badge">🏅 맨 오브 더 매치 · ${side.motm} (${side.motmRating})</div>` : '';
    const playerRow = p => {
      const rc = ratingColor(p.rating||0);
      const evIcons = [
        p.goal?`⚽`.repeat(p.goal):'',
        p.assist?`🅰️`:'',
        p.yellow?'🟨':'',
        p.red?'🟥':'',
      ].join('');
      const subStr = p.subOut?`<span class="lp-sub">↑${p.subIn||''} ${p.subOut}'</span>`
                   : p.subIn?`<span class="lp-sub" style="color:var(--win)">↑${p.subIn}'</span>`:'';
      return `<div class="lp-row">
        <span class="lp-no">${p.no}</span>
        <span class="lp-name">${p.name}</span>
        <span class="lp-pos">${p.pos}</span>
        <span class="lp-events">${evIcons}</span>
        ${subStr}
        ${p.rating?`<span class="lp-rating rating-color-${rc}">${p.rating}</span>`:''}
      </div>`;
    };
    return `<div class="lineup-section">
      <div class="lineup-sec-hd">${teamName} (${side.formation||''})</div>
      ${motmStr}
      <div class="lineup-grid">${starters.map(playerRow).join('')}</div>
      ${subs.length?`<div style="margin-top:10px"><div class="lineup-sec-hd" style="margin-top:8px">교체</div>
        <div class="lineup-grid">${subs.map(playerRow).join('')}</div></div>`:''}
    </div>`;
  }

  return renderTeamLineup(home, m.home) + renderTeamLineup(away, m.away);
}

function switchMCTab(btn, id) {
  btn.closest('.mc-panel').querySelectorAll('.mc-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.closest('.mc-panel').querySelectorAll('.mc-pane').forEach(p=>p.style.display='none');
  document.getElementById(id).style.display='block';
}

function closeMC(e) {
  if (e && e.target !== document.getElementById('mcOverlay')) return;
  document.getElementById('mcOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ══════════════════════════════════════════════
//  SQUAD
// ══════════════════════════════════════════════
function renderSquad() {
  const players = FM.players.filter(p=>p.league===curLeague);
  const myPlayers = players.filter(p=>isMyTeam(p.team));
  const otherPlayers = players.filter(p=>!isMyTeam(p.team));

  let html = '';
  if (myPlayers.length) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px">
      ⚽ ${FM.myTeam} 선수단</div>
      <div class="squad-grid">${myPlayers.map(renderPlayerCard).join('')}</div>`;
  }
  if (otherPlayers.length) {
    html += `<div style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 12px">
      기타 주요 선수</div>
      <div class="squad-grid">${otherPlayers.map(renderPlayerCard).join('')}</div>`;
  }
  if (!players.length) {
    html = '<p style="color:var(--t3)">해당 리그 선수 데이터가 없습니다.</p>';
  }

  document.getElementById('tab-squad').innerHTML = html;
}

function renderPlayerCard(p) {
  const s = p.seasonStats;
  const rc = ratingColor(s.rating||0);
  return `<div class="p-card" onclick="openPlayerDetail('${p.id}')">
    <div class="p-head">
      <div class="p-avatar">👤</div>
      <div class="p-info">
        <div class="p-name">${p.name}<span class="p-pos-badge">${p.pos}</span></div>
        <div class="p-meta">${p.team} · #${p.no} · ${p.nationality}</div>
        <div class="p-rating">⭐ ${s.rating} <span style="color:var(--t2);font-size:10px">/10</span></div>
      </div>
    </div>
    <div class="p-stats">
      <div class="p-stat"><div class="p-stat-v">${s.goals}</div><div class="p-stat-l">골</div></div>
      <div class="p-stat"><div class="p-stat-v">${s.assists}</div><div class="p-stat-l">어시</div></div>
      <div class="p-stat"><div class="p-stat-v">${s.apps}</div><div class="p-stat-l">출전</div></div>
      <div class="p-stat"><div class="p-stat-v">${s.mins}</div><div class="p-stat-l">분</div></div>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
//  PLAYER DETAIL MODAL
// ══════════════════════════════════════════════
function openPlayerDetail(id) {
  const p = FM.players.find(x=>x.id===id);
  if (!p) return;
  const s = p.seasonStats;

  const logRows = (p.matchLog||[]).map(l=>{
    const res = l.result.split(' ')[0];
    const cls = res==='W'?'res-w':res==='D'?'res-d':'res-l';
    return `<tr>
      <td>${fmtDate(l.date)}</td>
      <td>${l.opponent}</td>
      <td class="${cls}">${l.result}</td>
      <td>${l.mins}'</td>
      <td>${l.goals||'-'}</td>
      <td>${l.assists||'-'}</td>
      <td class="rating-color-${ratingColor(l.rating)}">${l.rating||'-'}</td>

  document.getElementById('pdContent').innerHTML = `
    <div class="pd-hero">
      <div class="pd-avatar">👤</div>
      <div class="pd-hero-info">

        <div class="pd-sub">
          <span class="pd-pos-pill">${p.pos}</span>
          ${p.team} · #${p.no} · ${p.nationality} · ${p.age}세

      <div class="pd-attr"><div class="pd-attr-v">${p.foot||'-'}</div><div class="pd-attr-l">주발</div></div>
      <div class="pd-attr"><div class="pd-attr-v">${s.starts||'-'}</div><div class="pd-attr-l">선발</div></div>
      <div class="pd-attr"><div class="pd-attr-v" class="rating-color-${ratingColor(s.rating)}">${s.rating}</div><div class="pd-attr-l">평균 평점</div></div>
    </div>
    <div class="pd-season">
      <div class="pd-sec-title">시즌 스탯</div>
      <div class="pd-sstats">
        <div class="pd-sstat"><div class="pd-sstat-v">${s.goals}</div><div class="pd-sstat-l">골</div></div>
        <div class="pd-sstat"><div class="pd-sstat-v">${s.assists}</div><div class="pd-sstat-l">어시스트</div></div>

      <div class="pd-sec-title">경기별 기록</div>
      <table class="pd-log-table">
        <thead><tr>
          <th>날짜</th><th>상대</th><th>결과</th>
          <th>출전</th><th>골</th><th>어시</th><th>평점</th>
        </tr></thead>
        <tbody>${logRows}</tbody>
      </table>
    </div>`:''}`;

  document.getElementById('pdOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closePD(e) {
  if (e && e.target !== document.getElementById('pdOverlay')) return;
  document.getElementById('pdOverlay').classList.remove('open');
  document.body.style.overflow='';
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function bindTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      switchTabTo(btn.dataset.tab);
    });
  });
}
function switchTabTo(tab) {
  curTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.style.display='none');
  const pane = document.getElementById('tab-'+tab);
  pane.style.display='block';
  pane.classList.remove('ani'); void pane.offsetWidth; pane.classList.add('ani');
}

init();
</script>
